<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>sofIA — Configurações</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

    :root {
      --bg: #000000;
      --fg: #ffffff;
      --fg-dim: rgba(255,255,255,0.45);
      --fg-faint: rgba(255,255,255,0.12);
      --surface: rgba(255,255,255,0.06);
      --surface-hover: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.10);
      --accent: #FFE27A;
      --accent-muted: rgba(255,226,122,0.15);
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page shell ── */
    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 640px;
      margin: 0 auto;
      padding: max(env(safe-area-inset-top, 0px), 1.5rem) 1.25rem max(env(safe-area-inset-bottom, 0px), 2rem);
    }

    /* ── Header ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--fg);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      text-decoration: none;
    }
    .back-btn:hover { background: var(--surface-hover); }
    .back-btn svg { width: 16px; height: 16px; }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    /* ── Section ── */
    .section {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2.25rem;
    }
    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--fg-dim);
      padding: 0 0.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── Personality card ── */
    .personality-card {
      padding: 1.25rem 1.25rem 1rem;
    }

    .personality-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .personality-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent-muted);
      border: 1px solid rgba(255,226,122,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .personality-icon svg { width: 18px; height: 18px; color: var(--accent); }
    .personality-meta { flex: 1; }
    .personality-name {
      font-size: 0.9375rem;
      font-weight: 500;
      line-height: 1.2;
    }
    .personality-desc {
      font-size: 0.78rem;
      color: var(--fg-dim);
      margin-top: 0.15rem;
    }

    /* Preset chips */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 0.875rem;
    }
    .preset-chip {
      font-size: 0.76rem;
      font-family: 'DM Sans', sans-serif;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: none;
      color: var(--fg-dim);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .preset-chip:hover {
      border-color: rgba(255,255,255,0.3);
      color: var(--fg);
      background: var(--surface-hover);
    }
    .preset-chip.active {
      background: var(--accent-muted);
      border-color: rgba(255,226,122,0.4);
      color: var(--accent);
    }

    /* Textarea */
    .personality-textarea-wrap {
      position: relative;
    }
    .personality-textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      line-height: 1.55;
      padding: 0.75rem 0.875rem;
      resize: none;
      outline: none;
      min-height: 96px;
      transition: border-color 0.2s;
    }
    .personality-textarea:focus {
      border-color: rgba(255,226,122,0.35);
    }
    .personality-textarea::placeholder {
      color: var(--fg-faint);
    }
    .char-count {
      position: absolute;
      bottom: 0.5rem;
      right: 0.75rem;
      font-size: 0.68rem;
      color: var(--fg-faint);
      pointer-events: none;
    }
    .char-count.warn { color: rgba(255,160,80,0.7); }

    /* Save button */
    .save-btn {
      width: 100%;
      margin-top: 0.875rem;
      padding: 0.7rem 1rem;
      border-radius: 12px;
      border: none;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .save-btn:hover { opacity: 0.9; }
    .save-btn:active { transform: scale(0.98); }
    .save-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* Save feedback */
    .save-feedback {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--accent);
      min-height: 1.25rem;
      margin-top: 0.5rem;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-feedback.visible { opacity: 1; }
    .save-feedback svg { width: 13px; height: 13px; }

    /* ── Toggle rows (other settings) ── */
    .setting-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.95rem 1.1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-row:hover { background: var(--surface-hover); }
    .setting-row-text { flex: 1; }
    .setting-row-title {
      font-size: 0.875rem;
      font-weight: 400;
      line-height: 1.2;
    }
    .setting-row-sub {
      font-size: 0.75rem;
      color: var(--fg-dim);
      margin-top: 0.15rem;
    }

    /* Toggle switch */
    .toggle {
      flex-shrink: 0;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: var(--fg-faint);
      border: 1px solid var(--border);
      position: relative;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      transition: transform 0.22s, background 0.2s;
    }
    .toggle:checked {
      background: var(--accent-muted);
      border-color: rgba(255,226,122,0.4);
    }
    .toggle:checked::after {
      transform: translateX(18px);
      background: var(--accent);
    }

    /* ── Danger zone ── */
    .danger-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.95rem 1.1rem;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: var(--radius);
    }
    .danger-row:hover { background: rgba(255,60,60,0.06); }
    .danger-row-title {
      font-size: 0.875rem;
      color: #ff6060;
    }
    .danger-row-icon { color: #ff6060; display: flex; }
    .danger-row-icon svg { width: 17px; height: 17px; }

    /* ── Footer ── */
    .config-footer {
      margin-top: auto;
      padding-top: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom, 0px), 1.5rem);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(30,30,30,0.95);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 0.825rem;
      color: var(--fg);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      backdrop-filter: blur(12px);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="top-bar">
    <a href="/" class="back-btn" aria-label="Voltar">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="page-title">Configurações</h1>
  </div>

  <!-- Personality -->
  <div class="section">
    <span class="section-label">Personalidade</span>
    <div class="card personality-card">
      <div class="personality-header">
        <div class="personality-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
          </svg>
        </div>
        <div class="personality-meta">
          <div class="personality-name">Definir personalidade</div>
          <div class="personality-desc">Como a sofIA deve se comportar com você</div>
        </div>
      </div>

      <!-- Presets -->
      <div class="presets" id="presets">
        <button class="preset-chip" data-preset="Seja direta e objetiva, sem rodeios.">Direta</button>
        <button class="preset-chip" data-preset="Seja simpática, calorosa e encorajadora.">Simpática</button>
        <button class="preset-chip" data-preset="Use um tom mais formal e profissional.">Formal</button>
        <button class="preset-chip" data-preset="Seja criativa, use metáforas e fale de forma poética.">Criativa</button>
        <button class="preset-chip" data-preset="Seja bem-humorada e use humor leve nas respostas.">Bem-humorada</button>
        <button class="preset-chip active" data-preset="">Personalizar</button>
      </div>

      <!-- Custom textarea -->
      <div class="personality-textarea-wrap">
        <textarea
          class="personality-textarea"
          id="personalityInput"
          maxlength="500"
          rows="4"
          placeholder="Ex: Seja objetiva e use exemplos práticos. Fale como se fosse uma amiga especialista..."
        ></textarea>
        <span class="char-count" id="charCount">0 / 500</span>
      </div>

      <button class="save-btn" id="saveBtn">Salvar personalidade</button>
      <div class="save-feedback" id="saveFeedback">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd"/>
        </svg>
        Salvo com sucesso
      </div>
    </div>
  </div>

  <!-- Preferences -->
  <div class="section">
    <span class="section-label">Preferências</span>
    <div class="card">
      <label class="setting-row">
        <div class="setting-row-text">
          <div class="setting-row-title">Respostas em Markdown</div>
          <div class="setting-row-sub">Formatar texto com negrito, listas, código, etc.</div>
        </div>
        <input type="checkbox" class="toggle" id="toggleMarkdown" checked />
      </label>
      <label class="setting-row">
        <div class="setting-row-text">
          <div class="setting-row-title">Leitura em voz alta automática</div>
          <div class="setting-row-sub">Reproduzir resposta automaticamente após envio</div>
        </div>
        <input type="checkbox" class="toggle" id="toggleTTS" />
      </label>
      <label class="setting-row">
        <div class="setting-row-text">
          <div class="setting-row-title">Salvar histórico de conversa</div>
          <div class="setting-row-sub">Manter conversas disponíveis para consulta futura</div>
        </div>
        <input type="checkbox" class="toggle" id="toggleHistory" checked />
      </label>
    </div>
  </div>

  <!-- Danger zone -->
  <div class="section">
    <span class="section-label">Zona de risco</span>
    <div class="card">
      <div class="danger-row" id="clearHistoryBtn">
        <div class="danger-row-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
          </svg>
        </div>
        <div class="setting-row-text">
          <div class="danger-row-title">Apagar todo o histórico</div>
        </div>
      </div>
    </div>
  </div>

  <div class="config-footer">sofIA · v1</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://sofia-api-z8nr.onrender.com';
  const STORAGE_KEY = 'sofia_config';

  // ── Load saved config ──
  function loadConfig() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) ?? {};
    } catch { return {}; }
  }
  function saveConfig(patch) {
    const current = loadConfig();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...current, ...patch }));
  }

  // ── Toast ──
  function showToast(msg, duration = 2200) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  // ── Init UI from storage ──
  const cfg = loadConfig();

  const personalityInput = document.getElementById('personalityInput');
  const charCount = document.getElementById('charCount');
  const saveBtn = document.getElementById('saveBtn');
  const saveFeedback = document.getElementById('saveFeedback');

  if (cfg.personality) personalityInput.value = cfg.personality;
  if (cfg.markdown !== undefined) document.getElementById('toggleMarkdown').checked = cfg.markdown;
  if (cfg.tts !== undefined) document.getElementById('toggleTTS').checked = cfg.tts;
  if (cfg.history !== undefined) document.getElementById('toggleHistory').checked = cfg.history;

  updateCharCount();
  syncPresetChips();

  // ── Char count ──
  personalityInput.addEventListener('input', () => {
    updateCharCount();
    syncPresetChips();
  });

  function updateCharCount() {
    const len = personalityInput.value.length;
    charCount.textContent = `${len} / 500`;
    charCount.className = 'char-count' + (len > 430 ? ' warn' : '');
  }

  // ── Presets ──
  document.querySelectorAll('.preset-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const preset = chip.dataset.preset;
      if (preset) {
        personalityInput.value = preset;
        updateCharCount();
      }
      syncPresetChips(chip);
    });
  });

  function syncPresetChips(activeChip) {
    const val = personalityInput.value.trim();
    document.querySelectorAll('.preset-chip').forEach(c => {
      if (activeChip) {
        c.classList.toggle('active', c === activeChip);
      } else {
        const isMatch = c.dataset.preset === val;
        const isCustom = !c.dataset.preset;
        c.classList.toggle('active', isMatch || (!val && isCustom) || (val && isCustom && !isPresetMatch(val)));
      }
    });
  }

  function isPresetMatch(val) {
    return Array.from(document.querySelectorAll('.preset-chip[data-preset]'))
      .some(c => c.dataset.preset === val);
  }

  // ── Save personality ──
  saveBtn.addEventListener('click', async () => {
    const text = personalityInput.value.trim();
    saveConfig({ personality: text });

    // Optionally send to API if user is authenticated
    const token = sessionStorage.getItem('sof_token');
    if (token && text) {
      try {
        await fetch(`${API_URL}/personality`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ personality: text })
        });
      } catch (_) {
        // If endpoint doesn't exist yet, save only locally — no problem
      }
    }

    // Show feedback
    saveFeedback.classList.add('visible');
    setTimeout(() => saveFeedback.classList.remove('visible'), 2500);
    showToast('Personalidade salva ✓');
  });

  // ── Toggle listeners ──
  document.getElementById('toggleMarkdown').addEventListener('change', e => {
    saveConfig({ markdown: e.target.checked });
    showToast(e.target.checked ? 'Markdown ativado' : 'Markdown desativado');
  });
  document.getElementById('toggleTTS').addEventListener('change', e => {
    saveConfig({ tts: e.target.checked });
    showToast(e.target.checked ? 'Voz automática ativada' : 'Voz automática desativada');
  });
  document.getElementById('toggleHistory').addEventListener('change', e => {
    saveConfig({ history: e.target.checked });
    showToast(e.target.checked ? 'Histórico ativado' : 'Histórico desativado');
  });

  // ── Clear history ──
  document.getElementById('clearHistoryBtn').addEventListener('click', async () => {
    if (!confirm('Tem certeza? Todo o histórico será apagado permanentemente.')) return;

    const token = sessionStorage.getItem('sof_token');
    if (token) {
      try {
        await fetch(`${API_URL}/history`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
      } catch (_) {}
    }
    showToast('Histórico apagado');
  });
</script>
</body>
</html>
